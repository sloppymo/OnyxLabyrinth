<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OnyxLabyrinth — VFX Vignette</title>
  <style>
    body {
      margin: 0;
      background: #050505;
      color: #e8e8f0;
      font-family: "FF36", monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 16px;
      box-sizing: border-box;
    }
    h1 {
      font-size: 18px;
      margin: 0 0 8px;
      color: #ffd769;
      letter-spacing: 2px;
    }
    #vignette-stage {
      position: relative;
      width: 100%;
      max-width: 768px;
      aspect-ratio: 768 / 672;
      margin: 0 auto;
    }
    #vignette-canvas {
      display: block;
      width: 100%;
      height: 100%;
      border: 2px solid #e8e8f0;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      background: #000;
      box-sizing: border-box;
    }
    #vignette-combat-windows {
      position: absolute;
      left: 6px;
      right: 6px;
      bottom: 6px;
      pointer-events: none;
    }
    #vignette-combat-windows .ff6-windows {
      width: 100%;
      pointer-events: auto;
    }
    #vignette-combat-windows .ff6-window {
      padding: 3px 8px;
      min-height: unset;
    }
    #vignette-combat-windows .ff6-menu-title {
      padding-bottom: 1px;
      margin-bottom: 1px;
    }
    #vignette-combat-windows .ff6-menu-item {
      line-height: 1.05;
      padding: 0 6px 0 26px;
    }
    #vignette-combat-windows .ff6-enemy-row {
      line-height: 1.05;
      padding: 0 4px;
    }
    #vignette-combat-windows .ff6-party-row {
      line-height: 1.05;
      padding: 0 4px;
      gap: 6px;
    }
    #vignette-combat-windows .ff6-hint-row {
      padding: 1px 6px 0;
    }
    #controls {
      display: flex;
      gap: 12px;
      align-items: center;
      margin-top: 12px;
      flex-wrap: wrap;
      justify-content: center;
    }
    #controls button {
      font-family: "FF36", monospace;
      font-size: 14px;
      padding: 6px 14px;
      background: #1a1c44;
      color: #e8e8f0;
      border: 1px solid #5068c8;
      cursor: pointer;
      border-radius: 3px;
    }
    #controls button:hover {
      background: #2a2c64;
    }
    #controls button.active {
      background: #5068c8;
      color: #fff;
    }
    #controls label {
      font-size: 12px;
      color: #b8c4f0;
    }
    #controls select {
      font-family: "FF36", monospace;
      font-size: 12px;
      padding: 4px 8px;
      background: #1a1c44;
      color: #e8e8f0;
      border: 1px solid #5068c8;
      border-radius: 3px;
    }
    #controls #btn-new-spells {
      background: #2a3a2a;
      border-color: #68a050;
    }
    #controls #btn-new-spells:hover {
      background: #3a5a3a;
    }
    #spell-info {
      margin-top: 8px;
      font-size: 21px;
      color: #b8c4f0;
      text-align: center;
      min-height: 28px;
    }
    #spell-style {
      margin-top: 6px;
      font-size: 16px;
      color: #8a9ac0;
      text-align: center;
      min-height: 24px;
    }
    #spell-queue {
      margin-top: 8px;
      font-size: 17px;
      color: #6878a8;
      text-align: center;
      max-width: 768px;
      line-height: 1.6;
    }
    #spell-queue .current {
      color: #ffd769;
      font-weight: bold;
    }
    #spell-queue .done {
      color: #4a5a8a;
      text-decoration: line-through;
    }
    @media (max-width: 640px) {
      #spell-info {
        font-size: 24px;
      }
      #spell-style {
        font-size: 18px;
      }
      #spell-queue {
        font-size: 19px;
      }
    }
  </style>
  <script type="module" crossorigin src="/OnyxLabyrinth/assets/vignette-D-_gbrA6.js"></script>
  <link rel="modulepreload" crossorigin href="/OnyxLabyrinth/assets/modulepreload-polyfill-Dezn_h7o.js">
  <link rel="modulepreload" crossorigin href="/OnyxLabyrinth/assets/arena-camera-Dbu6cKGg.js">
  <link rel="modulepreload" crossorigin href="/OnyxLabyrinth/assets/combat-select-action-view-VdCS6cQw.js">
  <link rel="stylesheet" crossorigin href="/OnyxLabyrinth/assets/arena-camera-BT-9uGt-.css">
</head>
<body>
  <h1>OnyxLabyrinth — Spell VFX Vignette</h1>
  <div id="vignette-stage">
    <canvas id="vignette-canvas" width="768" height="672"></canvas>
    <div id="vignette-combat-windows"></div>
  </div>
  <div id="controls">
    <button id="btn-play">Pause</button>
    <button id="btn-next">Next Spell</button>
    <button id="btn-restart">Restart</button>
    <button id="btn-slow">Slow Motion</button>
    <label for="spell-select">Jump to:</label>
    <select id="spell-select"></select>
    <button id="btn-new-spells" title="Jump to first new elemental spell">New Spells</button>
  </div>
  <div id="spell-info"></div>
  <div id="spell-style"></div>
  <div id="spell-queue"></div>
</body>
</html>
