<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OnyxLabyrinth — VFX Vignette</title>
  <style>
    body {
      margin: 0;
      background: #050505;
      color: #e8e8f0;
      font-family: "FF36", monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 16px;
      box-sizing: border-box;
    }
    h1 {
      font-size: 18px;
      margin: 0 0 8px;
      color: #ffd769;
      letter-spacing: 2px;
    }
    #vignette-canvas {
      border: 2px solid #e8e8f0;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      background: #000;
      max-width: 100%;
      height: auto;
    }
    #controls {
      display: flex;
      gap: 12px;
      align-items: center;
      margin-top: 12px;
      flex-wrap: wrap;
      justify-content: center;
    }
    #controls button {
      font-family: "FF36", monospace;
      font-size: 14px;
      padding: 6px 14px;
      background: #1a1c44;
      color: #e8e8f0;
      border: 1px solid #5068c8;
      cursor: pointer;
      border-radius: 3px;
    }
    #controls button:hover {
      background: #2a2c64;
    }
    #controls button.active {
      background: #5068c8;
      color: #fff;
    }
    #controls label {
      font-size: 12px;
      color: #b8c4f0;
    }
    #controls select {
      font-family: "FF36", monospace;
      font-size: 12px;
      padding: 4px 8px;
      background: #1a1c44;
      color: #e8e8f0;
      border: 1px solid #5068c8;
      border-radius: 3px;
    }
    #controls #btn-new-spells {
      background: #2a3a2a;
      border-color: #68a050;
    }
    #controls #btn-new-spells:hover {
      background: #3a5a3a;
    }
    #spell-info {
      margin-top: 8px;
      font-size: 14px;
      color: #b8c4f0;
      text-align: center;
      min-height: 20px;
    }
    #spell-style {
      margin-top: 6px;
      font-size: 11px;
      color: #8a9ac0;
      text-align: center;
      min-height: 18px;
    }
    #spell-queue {
      margin-top: 8px;
      font-size: 11px;
      color: #6878a8;
      text-align: center;
      max-width: 768px;
      line-height: 1.6;
    }
    #spell-queue .current {
      color: #ffd769;
      font-weight: bold;
    }
    #spell-queue .done {
      color: #4a5a8a;
      text-decoration: line-through;
    }
    #vignette-party-strip {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      max-width: 768px;
      width: 100%;
      margin-top: 12px;
      font-family: "FF36", monospace;
    }
    .vps-char {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 10px;
      font-size: 14px;
      color: #e8e8f0;
      border: 1px solid #3a3530;
      background: #14110d;
      min-width: 0;
      width: 100%;
      overflow: hidden;
    }
    .vps-char.ko {
      opacity: 0.45;
    }
    .vps-char .vps-name {
      color: #ffd769;
      font-size: 14px;
      min-width: 80px;
    }
    .vps-char .vps-bar {
      display: inline-block;
      width: 100px;
      height: 12px;
      background: #1a1612;
      border: 1px solid #4a4035;
      overflow: hidden;
    }
    .vps-char .vps-bar-fill {
      display: block;
      height: 100%;
    }
    .vps-char .vps-bar-fill.hp {
      background: #68a050;
    }
    .vps-char .vps-bar-fill.sp {
      background: #5068c8;
    }
    .vps-char .vps-num {
      font-size: 12px;
      color: #a8a8b8;
      min-width: 64px;
    }
    .vps-char .vps-status {
      font-size: 11px;
      color: #c080ff;
      margin-left: auto;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .vps-char .vps-status:empty {
      display: none;
    }
  </style>
  <script type="module" crossorigin src="/OnyxLabyrinth/assets/vignette-CkKhcch5.js"></script>
  <link rel="modulepreload" crossorigin href="/OnyxLabyrinth/assets/combat-scene-DpK63wZh.js">
  <link rel="stylesheet" crossorigin href="/OnyxLabyrinth/assets/combat-scene-DXDX18JO.css">
</head>
<body>
  <h1>OnyxLabyrinth — Spell VFX Vignette</h1>
  <canvas id="vignette-canvas" width="768" height="672"></canvas>
  <div id="controls">
    <button id="btn-play">Pause</button>
    <button id="btn-next">Next Spell</button>
    <button id="btn-restart">Restart</button>
    <button id="btn-slow">Slow Motion</button>
    <label for="spell-select">Jump to:</label>
    <select id="spell-select"></select>
    <button id="btn-new-spells" title="Jump to first new elemental spell">New Spells</button>
  </div>
  <div id="spell-info"></div>
  <div id="spell-style"></div>
  <div id="spell-queue"></div>
  <div id="vignette-party-strip"></div>
</body>
</html>
